<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bosch Car Service</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">Bosch Car Service</div>
        <nav id="navbar">
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <div class="hamburger" id="hamburger">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </header>

    <main>
        <section id="about">
            <h1>About Us</h1>
            <p>Welcome to Bosch Car Service...</p>
        </section>
        <section id="services">
            <h1>Our Services</h1>
            <p>We offer various car services...</p>
        </section>
        <section id="contact">
            <h1>Contact Us</h1>
            <p>Get in touch...</p>
        </section>
    </main>

    <footer>
        <p>© 2026 Bosch Car Service. All rights reserved.</p>
    </footer>
</body>
</html>

<style>
body {font-family: Arial, sans-serif; margin: 0; padding: 0;}
header {display: flex; justify-content: space-between; align-items: center; background: #333; color: white; padding: 10px;}
nav ul {list-style: none; padding: 0; display: flex;}
nav ul li {margin: 0 15px;}
nav ul li a {color: white; text-decoration: none;}
.hamburger {display: none; cursor: pointer;}
.line {background: white; height: 4px; width: 25px; margin: 4px;}
@media (max-width: 768px) {
    nav {display: none;}
    .hamburger {display: block;}
}
</style>

<script>
document.getElementById('hamburger').addEventListener('click', function() {
    var navbar = document.getElementById('navbar');
    if (navbar.style.display === 'block') {
        navbar.style.display = 'none';
    } else {
        navbar.style.display = 'block';
    }
});
</script>
